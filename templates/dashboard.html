<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { background: #f4f6f9; }
  .card { border-radius: 15px; }
  .status-box {
    border-radius: 10px;
    padding: 15px;
    text-align: center;
  }
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container-fluid">

    <span class="navbar-brand fw-bold">🔐 Secure Login System</span>

    <div>
      {% if role == "admin" %}
      <a href="/admin" class="btn btn-warning btn-sm me-2">⚙ Admin Panel</a>
      {% endif %}

      <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>

  </div>
</nav>

<!-- MAIN -->
<div class="container mt-5">

  <div class="card shadow p-4 mx-auto" style="max-width:600px;">

    <h2 class="text-center mb-3">👤 User Dashboard</h2>

    <p class="text-center">
      Welcome, <strong>{{ user }}</strong> 👋
    </p>

    <hr>

    <div class="row text-center mb-4">

      <div class="col-md-4">
        <div class="status-box bg-success text-white">
          Active
        </div>
      </div>

      <div class="col-md-4">
        <div class="status-box bg-info text-white">
          Security High
        </div>
      </div>

      <div class="col-md-4">
        <div class="status-box bg-warning text-dark">
          Protected
        </div>
      </div>

    </div>

    <div class="text-center">
      <p>System protects against brute force and suspicious activity.</p>
    </div>

  </div>

</div>

</body>
</html>
